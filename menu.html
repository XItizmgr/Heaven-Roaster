<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Menu</title>
    <link rel="shortcut icon" href="assects/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="menu.css" />
    <link rel="stylesheet" href="Navbar.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <a href="index.html">
        <img
          src="./assects/logobackgroundremove.png"
          alt="coffee"
          width="150px"
          height="100px"
          class="logo"
        />
      </a>
      <div class="nav-items">
        <img src="./assects/close.png" width="20px" class="close" />
        <ul class="nav-item">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="index.html#section-2" class="nav-link">About</a></li>
          <li><a href="index.html#section-3" class="nav-link">Menu</a></li>
          <li><a href="index.html#section-4" class="nav-link">Review</a></li>
          <li><a href="index.html#section-5" class="nav-link">Contact</a></li>
        </ul>
      </div>

      <img src="./assects/more.png" width="20px" class="ham" />
      <button class="book-now">Buy Now</button>
    </nav>
    <section class="menu-section">
      <div class="menu-header">
        <h1>Our Heaven Roaster Menu</h1>
        <p>
          Premium beans. Expert roasting. Crafted beverages. Discover bold
          flavors and smooth blends curated for coffee lovers.
        </p>
      </div>
      <div class="menu-category">
        <div class="menu-card-wrapper">
          <h2 class="category-title">Espresso Based</h2>
          <div class="menu-grid" id="espresso"></div>
        </div>

        <div class="menu-card-wrapper">
          <h2 class="category-title">Cold & Iced</h2>
          <div class="menu-grid" id="cold-iced"></div>
        </div>

        <div class="menu-card-wrapper">
          <h2 class="category-title">Small Bites & Baked Treats</h2>
          <div class="menu-grid" id="smallbites"></div>
        </div>

        <div class="menu-card-wrapper">
          <h2 class="category-title">Cakes & Loaves</h2>
          <div class="menu-grid" id="cakes"></div>
        </div>

        <div class="menu-card-wrapper">
          <h2 class="category-title">Premium Specialties</h2>
          <div class="menu-grid" id="premium"></div>
        </div>
      </div>
    </section>
    <script type="module" src="menu.js"></script>
  </body>
</html>
