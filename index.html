<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee</title>
    <link
      rel="shortcut icon"
      href="./assects/"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav-bar">
      <img
        src="./assects/logo-removebg-preview.png"
        alt="coffee"
        width="170px"
        height="100px"
        class="logo"
      />
      <div class="nav-items">
        <img src="./assects/close.png" width="20px" class="close" />
        <ul class="nav-item">
          <li><a href="#section-1">Home</a></li>
          <li><a href="#section-2">About</a></li>
          <li><a href="#section-3">Menu</a></li>
          <li><a href="#section-4">Review</a></li>
        </ul>
      </div>

      <img src="./assects/more.png" width="20px" class="ham" />
      <div class="right-sidelogo">
        <button class="book-now">Book Now</button>
      </div>
    </nav>
    <div class="Hero" id="section-1">
      <!-- <video autoplay loop muted><source src="./assects/wmremove-transformed.mp4" type="video/mp4"></video> -->
      <div class="container">
        <div class="card">
          <h2 class="title">Registration</h2>
          <br>
          <form>
            <input type="text" placeholder="Enter your display name" class="input" />
            <input type="email" placeholder="Enter your email" class="input" />
            <input
              type="password"
              placeholder="Create password"
              class="input"
            />
            <input
              type="password"
              placeholder="Confirm password"
              class="input"
            />
            
            <label class="checkbox">
              <input type="checkbox" />
              <span>I accept all terms & conditions</span>
            </label>

            <button type="submit">Register Now</button>
          </form>

          <p class="login-text">
            Already have an account?
<button class="login">Login now</button>
          </p>
        </div>
      </div>
      <div class="container2">
         <h2 class="title">Login Form</h2><br>
        <form>
            <input type="text " placeholder="Enter your email or User name " class="input" />
            <input
              type="password"
              placeholder="password"
              class="input"
            />
             <button type="submit">Login now</button>
      </div>
    </div>
    <div class="About" id="section-2"></div>
    <div class="Menu" id="section-3"></div>
    <div class="Review" id="section-4"></div>
  </body>
  <script src="script.js"></script>
</html>
